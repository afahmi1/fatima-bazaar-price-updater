<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fatima Bazaar Price Updater</title>
  <style>
    :root { --green:#2E7D32; --green-d:#1B5E20; --bg:#f4f6f4; --line:#dfe5df; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           background:var(--bg); color:#1c2b1c; }
    header { background:var(--green); color:#fff; padding:16px 24px; display:flex;
             align-items:center; justify-content:space-between; }
    header h1 { font-size:18px; margin:0; font-weight:600; }
    header a { color:#d8f0d8; text-decoration:none; margin-left:18px; font-size:14px; }
    header a:hover { color:#fff; text-decoration:underline; }
    main { max-width:980px; margin:24px auto; padding:0 20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px;
            padding:24px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    h2 { margin-top:0; font-size:20px; }
    label { font-weight:600; font-size:14px; display:block; margin-bottom:6px; }
    input[type=text], input[type=number], select, input[type=file] {
            width:100%; padding:9px 11px; border:1px solid var(--line);
            border-radius:8px; font-size:14px; background:#fff; }
    .btn { background:var(--green); color:#fff; border:none; padding:11px 20px;
           border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
    .btn:hover { background:var(--green-d); }
    .btn.secondary { background:#eceeec; color:#1c2b1c; }
    .flash { background:#fff7e0; border:1px solid #f0d98a; color:#7a5b00;
             padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:9px 10px; border-bottom:1px solid var(--line); text-align:left; }
    th { background:#f0f4f0; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .muted { color:#6b7a6b; font-size:13px; }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px;
            font-weight:600; }
    .pill.new { background:#fde7e7; color:#a02020; }
    .pill.known { background:#e3f1e3; color:#1B5E20; }
    .pill.match { background:#e0ecfb; color:#14407a; }
    .pill.sugg { background:#fff0d6; color:#a05a00; }
    .row-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .hint { font-size:12px; color:#6b7a6b; font-weight:400; margin-top:4px; }
  </style>
</head>
<body>
  <header>
    <h1>🥬 Fatima Bazaar — Price Updater</h1>
    <nav>
      <a href="{{ url_for('index') }}">Upload</a>
      <a href="{{ url_for('items') }}">Item Memory</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
